name: Update Asset Momentum Data

on:
  schedule:
    # 20th of every month at 07:00 UTC
    - cron: "0 7 20 * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "yfinance>=0.2.40" pandas requests

      - name: Fetch momentum data
        run: python fetch_momentum.py

      - name: Show output
        run: cat momentum_data.json

      - name: Commit updated momentum_data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add momentum_data.json
          git diff --cached --quiet || git commit -m "chore: asset momentum update $(date -u '+%Y-%m-%d')"
          git push

      - name: Send email notification
        env:
          GMAIL_USER:   ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:   ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python send_notify.py
